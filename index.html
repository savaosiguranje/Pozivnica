<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pozivnica | Invitation</title>

    <style>
        @font-face {
            font-family: 'Brandon Text';
            src: url('fonts/Brandon_reg.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Brandon Text', Arial, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px 10px 24px;
        }

        /* SR / EN dugme */
        .lang-toggle {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }

        .lang-btn-group {
            display: flex;
            border: 1px solid rgba(223, 186, 115, 0.45);
            border-radius: 3px;
            overflow: hidden;
        }

        .lang-btn {
            padding: 6px 14px;
            background: transparent;
            border: none;
            color: #9b9b9b;
            font-family: 'Brandon Text', Arial, sans-serif;
            font-size: 10px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .lang-btn:first-child {
            border-right: 1px solid rgba(223, 186, 115, 0.45);
        }

        .lang-btn.aktivan {
            background: #dfba73;
            color: #0b0b0b;
        }

        /* Slika pozivnice */
        .pozivnica-kontejner {
            width: 100%;
            max-width: 600px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .pozivnica-kontejner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Klikabilna zona preko dizajnerskog dugmeta na PNG/JPG pozivnici */
        .dugme-overlay {
            position: absolute;
            top: 72.3%;
            left: 61%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .dugme {
            display: block;
            width: 230px;
            height: 46px;
            background: transparent;
            border: none;
            color: transparent;
            font-size: 0;
            text-decoration: none;
            cursor: pointer;
            border-radius: 30px;
            transition: box-shadow 0.25s ease, background 0.25s ease;
        }

        .dugme:hover {
            background: rgba(223, 186, 115, 0.06);
            box-shadow: 0 0 18px rgba(223, 186, 115, 0.22);
        }

        /* Donja sekcija / countdown */
        .donja-sekcija {
            width: 100%;
            max-width: 600px;
            background: #111111;
            padding: 18px 16px 20px;
            text-align: center;
            border-top: 1px solid rgba(223, 186, 115, 0.25);
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }

        .tajmer-naslov {
            font-family: 'Brandon Text', Arial, sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8f8f8f;
            margin-bottom: 12px;
        }

        #countdown {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 10px;
            flex-wrap: nowrap;
        }

        .vreme-blok {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }

        .broj {
            font-family: 'Brandon Text', Arial, sans-serif;
            font-size: 30px;
            font-weight: 400;
            color: #dfba73;
            line-height: 1;
            letter-spacing: 1px;
        }

        .oznaka {
            font-family: 'Brandon Text', Arial, sans-serif;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            color: #6f6f6f;
            margin-top: 6px;
        }

        .separator {
            font-size: 22px;
            color: rgba(223, 186, 115, 0.35);
            line-height: 1;
            padding-top: 2px;
        }

        .proslava-pocela {
            color: #dfba73;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            body {
                padding: 8px 8px 18px;
            }

            .lang-toggle {
                margin-bottom: 6px;
            }

            .lang-btn {
                padding: 5px 12px;
                font-size: 9px;
            }

            .donja-sekcija {
                padding: 14px 10px 16px;
            }

            .tajmer-naslov {
                font-size: 9px;
                letter-spacing: 1.5px;
                margin-bottom: 10px;
            }

            #countdown {
                gap: 6px;
            }

            .vreme-blok {
                min-width: 42px;
            }

            .broj {
                font-size: 24px;
                letter-spacing: 0.5px;
            }

            .oznaka {
                font-size: 7px;
                letter-spacing: 1px;
                margin-top: 5px;
            }

            .separator {
                font-size: 18px;
                padding-top: 2px;
            }

            .dugme {
                width: 190px;
                height: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="lang-toggle">
        <div class="lang-btn-group">
            <button class="lang-btn aktivan" type="button" data-lang="sr">SR</button>
            <button class="lang-btn" type="button" data-lang="en">EN</button>
        </div>
    </div>

    <div class="pozivnica-kontejner">
        <img id="pozivnica-slika" src="pozivnica-sr.png" alt="Sava osiguranje pozivnica">

        <div class="dugme-overlay">
            <a
                id="dugme-link"
                class="dugme"
                href="https://docs.google.com/forms/d/e/1FAIpQLSdVNo_4dIcVvmEqa7Uu7C7j6UKqvZlkq9LoRKDpI_7KrB83Fw/viewform"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Potvrdite dolazak"
            >Potvrdite dolazak</a>
        </div>
    </div>

    <div class="donja-sekcija">
        <div class="tajmer-wrapper">
            <div class="tajmer-naslov" id="tajmer-naslov">Do svečanosti je ostalo još</div>

            <div id="countdown">
                <div class="vreme-blok">
                    <span class="broj" id="days">00</span>
                    <span class="oznaka" id="label-days">Dana</span>
                </div>
                <span class="separator">·</span>
                <div class="vreme-blok">
                    <span class="broj" id="hours">00</span>
                    <span class="oznaka" id="label-hours">Sati</span>
                </div>
                <span class="separator">·</span>
                <div class="vreme-blok">
                    <span class="broj" id="minutes">00</span>
                    <span class="oznaka" id="label-minutes">Minuta</span>
                </div>
                <span class="separator">·</span>
                <div class="vreme-blok">
                    <span class="broj" id="seconds">00</span>
                    <span class="oznaka" id="label-seconds">Sekundi</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const formaSr = 'https://docs.google.com/forms/d/e/1FAIpQLSdVNo_4dIcVvmEqa7Uu7C7j6UKqvZlkq9LoRKDpI_7KrB83Fw/viewform';

        // Kada dobiješ englesku Google formu, samo ovde zameni link.
        const formaEn = 'https://docs.google.com/forms/d/e/1FAIpQLSdVNo_4dIcVvmEqa7Uu7C7j6UKqvZlkq9LoRKDpI_7KrB83Fw/viewform';

        const prevodi = {
            sr: {
                slika: 'pozivnica-sr.png',
                link: formaSr,
                aria: 'Potvrdite dolazak',
                alt: 'Sava osiguranje pozivnica',
                tajmerNaslov: 'Do svečanosti je ostalo još',
                dana: 'Dana',
                sati: 'Sati',
                minuta: 'Minuta',
                sekundi: 'Sekundi',
                pocela: 'Svečanost je počela!'
            },
            en: {
                slika: 'pozivnica-en.png',
                link: formaEn,
                aria: 'Confirm attendance',
                alt: 'Sava Insurance invitation',
                tajmerNaslov: 'Time until the event',
                dana: 'Days',
                sati: 'Hours',
                minuta: 'Minutes',
                sekundi: 'Seconds',
                pocela: 'The celebration has begun!'
            }
        };

        let trenutniJezik = 'sr';

        function setLang(jezik) {
            trenutniJezik = jezik;
            const t = prevodi[jezik];

            document.getElementById('pozivnica-slika').src = t.slika;
            document.getElementById('pozivnica-slika').alt = t.alt;
            document.getElementById('dugme-link').href = t.link;
            document.getElementById('dugme-link').setAttribute('aria-label', t.aria);
            document.getElementById('tajmer-naslov').textContent = t.tajmerNaslov;
            document.getElementById('label-days').textContent = t.dana;
            document.getElementById('label-hours').textContent = t.sati;
            document.getElementById('label-minutes').textContent = t.minuta;
            document.getElementById('label-seconds').textContent = t.sekundi;

            document.querySelectorAll('.lang-btn').forEach(function(btn) {
                btn.classList.toggle('aktivan', btn.dataset.lang === jezik);
            });

            document.documentElement.lang = jezik;
        }

        document.querySelectorAll('.lang-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                setLang(btn.dataset.lang);
            });
        });

        const datumDogadjaja = new Date(2026, 8, 3, 19, 0, 0).getTime();

        function updateCountdown() {
            const sada = new Date().getTime();
            const razlika = datumDogadjaja - sada;

            if (razlika < 0) {
                const t = prevodi[trenutniJezik];
                document.querySelector('.tajmer-wrapper').innerHTML =
                    '<p class="proslava-pocela">' + t.pocela + '</p>';
                return;
            }

            const dana = Math.floor(razlika / (1000 * 60 * 60 * 24));
            const sati = Math.floor((razlika % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minuta = Math.floor((razlika % (1000 * 60 * 60)) / (1000 * 60));
            const sekundi = Math.floor((razlika % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(dana).padStart(2, '0');
            document.getElementById('hours').textContent = String(sati).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minuta).padStart(2, '0');
            document.getElementById('seconds').textContent = String(sekundi).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
